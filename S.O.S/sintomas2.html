<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>S.O.S - Triagem Digital</title>

    <link rel="stylesheet" href="sintomas2(style).css">

<body>

    <div class="barrainicial">
        <a href="inicial.html" class="voltar">←</a>

        <img src="imagens/logo.png" alt="Logo" height="110px" width="115px">

        <p style="color: whitesmoke; font-size: 40px;">
            S.O.S
        </p>
    </div>

    <div class="conteudo">

        <br><br><br>

        <p style="font-size: 75px; text-align: center;">
            Registro
        </p>

        <div class="forms-container">

            <div class="form1">

                <form action="#">

                    <p style="font-size: 45px; text-align: center;">
                        Intensidade dos Sintomas
                    </p>

                    <br><br><br><br>

                    <input class="checkbox-area" type="checkbox" id="doenca1">
                    <label class="checkbox-area" for="doenca1">Leve</label>

                    <br><br><br><br>

                    <input class="checkbox-area" type="checkbox" id="doenca2">
                    <label class="checkbox-area" for="doenca2">Moderado</label>

                    <br><br><br><br>

                    <input class="checkbox-area" type="checkbox" id="doenca3">
                    <label class="checkbox-area" for="doenca3">Intensa</label>

                    <br><br><br>

                </form>

            </div>

            <div class="form2">

                <form action="#">

                    <p style="font-size: 45px; text-align: center;">
                        Duração dos Sintomas
                    </p>

                    <br><br>

                    <br>

                    <input class="checkbox-area" type="checkbox" id="doenca6">
                    <label class="checkbox-area" for="doenca6">Minutos</label>

                    <br><br><br>

                    <input class="checkbox-area" type="checkbox" id="doenca7">
                    <label class="checkbox-area" for="doenca7">Horas</label>

                    <br><br><br>

                    <input class="checkbox-area" type="checkbox" id="doenca8">
                    <label class="checkbox-area" for="doenca8">Dias</label>

                    <br><br><br>

                    <input class="checkbox-area" type="checkbox" id="doenca8">
                    <label class="checkbox-area" for="doenca8">Semanas</label>

                    <br><br><br>

                </form>

            </div>


        </div>

        <form action="#">
            <br><br><br><br>
            <center><button class="input-button" type="submit">Continuar</button></center>
        </form>

    </div>



</body>

</html>
