<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.O.S - Triagem Digital</title>
    <link rel="stylesheet" href="cadastro(style).css">
</head>

<body>
    <div class="barrainicial">
        <a href="home.html" class="voltar">←</a>
        <img src="imagens/logo.png" alt="Logo" height="110px" width="115px">
        <p style="color: whitesmoke; font-size: 40px; ">S.O.S</p>
    </div>
    <div class="conteudo">
        <br><br><br>
        <p style="font-size: 50px; text-align: center;">Bem-Vindo!</p>
    </div>
    <div class="conteudo">
        <form action="aviso.html">
            <label for="name">Nome:</label> <br>
            <input class="input" type="text" id="name" name="name" placeholder="Ex: Maria Silva" required><br><br>

            <label for="email">Email:</label> <br>
            <input class="input" type="email" id="email" name="email" placeholder="Ex: mariasilva123@gmail.com"
                required><br><br>

            <label for="password">Senha:</label> <br>
            <input class="input" type="password" id="password" name="password" placeholder="Digite sua Senha"
                required><br><br>

            <label for="date">Data de Nascimento:</label>
            <input class="input-date" type="date" name="date" id="date" required> <br><br>

            <label for="sexo">Sexo:</label>
            <select class="input-genero" id="sexo" name="sexo">
                <option value=""></option>
                <option value="masculino">Masculino</option>
                <option value="feminino">Feminino</option>
                <option value="outro">Outro</option>
            </select>

            <div class="checkbox-area">
                <label for="checkbox">
                    <input type="checkbox" name="checkbox" id="checkbox">
                    Tenho alguma doença pré-existente
                </label>
                <br><br>
                <button class="input-button" type="submit">Cadastrar-se</button>
        </form>
    </div>
</body>

</html>
